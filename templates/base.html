<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PRMSU Secure 2FA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6e8efb; --s: #a777e3; --glass: rgba(255, 255, 255, 0.9); }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, var(--p), var(--s)); height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; }
        .card { background: var(--glass); padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 360px; text-align: center; animation: slideUp 0.5s ease; position: relative; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; transition: 0.3s; font-family: inherit; }
        input:focus { border-color: var(--p); outline: none; }
        button { width: 100%; padding: 14px; background: linear-gradient(to right, var(--p), var(--s)); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(110, 142, 251, 0.4); }
        button:active { transform: translateY(0); }
        .error-box { color: #ff4d4d; background: #ffebeb; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 13px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        a { color: var(--p); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
