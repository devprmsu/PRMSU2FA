<!DOCTYPE html>
<html>
<head>
    <title>PRMSU 2FA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6e8efb; --s: #a777e3; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, var(--p), var(--s)); height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; }
        .card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 380px; text-align: center; animation: up 0.5s ease; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: linear-gradient(to right, var(--p), var(--s)); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { transform: scale(1.02); opacity: 0.9; }
        .cam-view { width: 100%; height: 200px; background: #000; border-radius: 15px; overflow: hidden; margin-bottom: 15px; border: 3px solid var(--p); position: relative; }
        video { object-fit: cover; width: 100%; height: 100%; }
        @keyframes up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>{% block content %}{% endblock %}</body>
</html>
