{% extends "base.html" %}
{% block content %}
<div class="card">
    <i class="fas fa-shield-halved fa-3x" style="color: var(--p); margin-bottom: 20px;"></i>
    <h2>Sign In</h2>
    <div id="error-msg" class="error-box"></div>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button onclick="doLogin()">Proceed to Face ID <i class="fas fa-arrow-right"></i></button>
    <p style="font-size: 13px; margin-top: 15px;">New user? <a href="/register_page" style="color: var(--p); text-decoration: none; font-weight: 600;">Register Here</a></p>
</div>
<script>
    async function doLogin() {
        const res = await fetch('/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email: document.getElementById('email').value, password: document.getElementById('password').value})
        });
        const data = await res.json();
        if (res.ok) window.location.href = data.next;
        else { document.getElementById('error-msg').innerText = data.message; document.getElementById('error-msg').style.display = 'block'; }
    }
</script>
{% endblock %}
