{% extends "base.html" %}
{% block content %}
<div class="card">
    <div style="background: #f0f3ff; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
        <i class="fas fa-fingerprint fa-2x" style="color: var(--p);"></i>
    </div>
    <h2>Secure Login</h2>
    <div id="error-msg" class="error-box"></div>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button id="lBtn" onclick="doLogin()">Verify Credentials <i class="fas fa-chevron-right"></i></button>
    <p style="font-size: 13px;">New? <a href="/register_page">Create Account</a></p>
</div>

<script>
async function doLogin() {
    const btn = document.getElementById('lBtn');
    const err = document.getElementById('error-msg');
    err.style.display = 'none';
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';

    const res = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        })
    });
    const data = await res.json();
    if (res.ok) window.location.href = data.next;
    else {
        err.innerText = data.message;
        err.style.display = 'block';
        btn.innerHTML = 'Verify Credentials <i class="fas fa-chevron-right"></i>';
    }
}
</script>
{% endblock %}
