{% extends "base.html" %}
{% block content %}
<div class="card">
    <div class="cam-view">
        <video id="v" autoplay muted></video>
        <div style="position:absolute; top:0; width:100%; height:2px; background:var(--p); box-shadow:0 0 15px var(--p); animation: s 2s linear infinite;"></div>
    </div>
    <h2>Biometric Scan</h2>
    <p id="t">Center your face in the frame.</p>
    <button onclick="scan()">Start Face ID</button>
</div>
<style>@keyframes s { 0% { top: 0; } 100% { top: 100%; } }</style>
<script>
    navigator.mediaDevices.getUserMedia({video:true}).then(s => document.getElementById('v').srcObject=s);
    async function scan() {
        document.getElementById('t').innerText = "Scanning...";
        const res = await fetch('/run_face_scan', {method:'POST'});
        if(res.ok) window.location.href='/home';
        else alert("Unauthorized!");
    }
</script>
{% endblock %}
